<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../assets/product/vector/vector_small.png">
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
  <title>Account | Protonyx</title>
  <style>
    /* Gradient treatment for the plan field when the user is on Pro.
       Applied by the script below based on the plan value from GET /me. */
    .plan-pro {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }

    /* Email row: badge on the left, verification control on the right. */
    .account-info-list dd.email-cell {
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* Verification badge wrapping the email value. Neutral base uses the
       existing tokens; verified/unverified swap in two muted accent colors. */
    .email-badge {
      display: inline-block;
      padding: 0.35rem 0.7rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: 0.95rem;
      line-height: 1.2;
      word-break: break-all;
    }

    /* Verified: muted green echoing the brand gradient's green stop (#3a8c6e). */
    .email-badge.verified {
      background: rgba(58, 140, 110, 0.10);
      border-color: rgba(58, 140, 110, 0.40);
      color: #2f7d5b;
    }

    /* Unverified: muted red, same low-saturation treatment. */
    .email-badge.unverified {
      background: rgba(179, 70, 63, 0.10);
      border-color: rgba(179, 70, 63, 0.40);
      color: #b3463f;
    }

    .email-verify-actions {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* Small, non-dominant variant of the page's outline button. */
    .btn-verify {
      padding: 0.4rem 0.9rem;
      font-size: 0.75rem;
    }

    .verify-message {
      font-size: 0.8rem;
    }
    .verify-message.success { color: #2f7d5b; }
    .verify-message.error { color: #b3463f; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo">
      <a href="/">
        <img
          id="navbarLogo"
          src="../assets/company/protonyx_full_white.png"
          alt="Protonyx logo"
        >
      </a>
    </div>

    <div class="navbar-actions">
      <a href="/auth/index.html?mode=signup" class="navbar-signup-link guest-only">Create Account</a>
      <span class="navbar-plan-badge pro-only">Professional</span>
      <a href="/account/index.html" class="navbar-profile-icon auth-only" aria-label="Account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 21c0-4 4-7 8-7s8 3 8 7"></path>
        </svg>
      </a>
      <button class="navbar-menu-button" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <section class="products-hero">
    <div class="products-hero-inner">
      <p class="products-label" id="accountHeroTitle">Account</p>
      <p id="accountHeroSubtitle" style="font-size: 13px; color: #fff; margin: 0;">Account</p>
    </div>
  </section>

  <section class="account-section">
    <div class="account-section-inner">
      <p class="section-label">Profile</p>

      <dl class="account-info-list">
        <!-- Source: GET /me -> user.username -->
        <dt>Username</dt>
        <dd id="infoUsername">-</dd>

        <!-- Source: GET /me -> user.email + user.email_verified -->
        <dt>Email</dt>
        <dd class="email-cell">
          <span id="infoEmail" class="email-badge">-</span>
          <span class="email-verify-actions">
            <span id="verifyMessage" class="verify-message" role="status" aria-live="polite"></span>
            <button type="button" id="resendVerifyBtn" class="btn-outline-gray btn-verify" hidden>Send Verification Email</button>
          </span>
        </dd>

        <!-- Source: GET /me -> user.plan (styled with --grad when 'pro') -->
        <dt>Plan</dt>
        <dd id="infoPlan">-</dd>

        <!-- Source: GET /me -> user.member_since (formatted) -->
        <dt>Member since</dt>
        <dd id="infoMemberSince">-</dd>

        <!-- Source: GET /me -> user.beta_access -->
        <dt>Beta access</dt>
        <dd id="infoBetaAccess">-</dd>

        <!-- Source: GET /me -> user.download_count -->
        <dt>Downloads</dt>
        <dd id="infoDownloadCount">-</dd>
      </dl>

      <div class="account-logout-row">
        <button type="button" class="btn-outline-gray" data-logout>Logout</button>
      </div>
    </div>
  </section>

  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-overlay-inner">
      <div class="menu-overlay-header">
        <div class="menu-overlay-brand">
          <img src="../assets/company/protonyx_full_white.png" alt="Protonyx logo">
        </div>
        <button class="menu-close-button" id="menuCloseButton" aria-label="Close menu">×</button>
      </div>
      <div class="menu-overlay-content">
        <div class="menu-column">
          <p class="menu-label">Navigation</p>
          <a href="/" class="menu-link-reveal">Home</a>
          <a href="/#plans" class="menu-link-reveal">Plans</a>
          <a href="/about" class="menu-link-reveal">About</a>
          <a href="/contact" class="menu-link-reveal">Contact</a>
          <button type="button" class="menu-logout-button auth-only" data-logout>Logout</button>
        </div>

        <div class="menu-column">
          <p class="menu-label">Account</p>
          <a href="/auth/index.html?mode=signup" class="menu-link-reveal guest-only">Create Account</a>
          <a href="/auth/index.html" class="menu-link-reveal guest-only">Login</a>
          <a href="/account/index.html" class="menu-link-reveal auth-only">Profile</a>
          <a href="/assets/downloads/Vector-Setup.exe" download data-download class="menu-link-reveal">Download</a>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-top">
      <p>&copy; 2026 Protonyx LLC. All rights reserved.</p>
      <nav class="footer-links">
        <a href="/tos">Terms of Service</a>
        <a href="/privacy">Privacy Policy</a>
        <a href="/contact">Contact</a>
        <a href="/about">About</a>
      </nav>
    </div>
  </footer>

  <script src="../script.js"></script>
  <script src="../auth/auth.js"></script>
  <script src="../legal-modal.js"></script>
  <script>
    (function () {
      if (!localStorage.getItem("token")) {
        window.location.href = "/auth/index.html";
        return;
      }

      const heroTitleEl = document.getElementById("accountHeroTitle");
      if (heroTitleEl) {
        heroTitleEl.textContent = localStorage.getItem("username") || "Account";
      }

      function formatMemberSince(value) {
        if (!value) return "-";
        const d = new Date(value);
        if (isNaN(d.getTime())) return "-";
        return d.toLocaleDateString(undefined, {
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      }

      function render(profile) {
        // Source: GET /me (with localStorage as fallback for initial paint)
        const username = (profile && profile.username) || localStorage.getItem("username") || "User";
        const email = (profile && profile.email) || localStorage.getItem("email") || "-";
        const plan = (profile && profile.plan) || localStorage.getItem("plan") || "free";
        const memberSince = (profile && profile.member_since) || localStorage.getItem("member_since") || "";
        const betaAccess = profile
          ? Boolean(profile.beta_access)
          : localStorage.getItem("beta_access") === "true";
        const downloadCount = profile
          ? Number(profile.download_count ?? 0)
          : Number(localStorage.getItem("download_count") || 0);
        const emailVerified = profile
          ? Boolean(profile.email_verified)
          : localStorage.getItem("email_verified") === "true";

        // Cache email_verified so the next localStorage-first paint is accurate
        // (loadProfile() in auth.js does not mirror this field).
        if (profile) {
          localStorage.setItem("email_verified", emailVerified ? "true" : "false");
        }

        document.getElementById("infoUsername").textContent = username;

        const emailEl = document.getElementById("infoEmail");
        emailEl.textContent = email;
        emailEl.classList.toggle("verified", emailVerified);
        emailEl.classList.toggle("unverified", !emailVerified);

        // The resend button shows only while unverified. A successful send
        // leaves it disabled, so don't re-enable it here on re-render.
        const resendBtn = document.getElementById("resendVerifyBtn");
        if (resendBtn) resendBtn.hidden = emailVerified;
        if (emailVerified) {
          const verifyMessageEl = document.getElementById("verifyMessage");
          if (verifyMessageEl) {
            verifyMessageEl.textContent = "";
            verifyMessageEl.classList.remove("success", "error");
          }
        }

        const planEl = document.getElementById("infoPlan");
        planEl.textContent = plan.charAt(0).toUpperCase() + plan.slice(1);
        planEl.classList.toggle("plan-pro", plan.toLowerCase() === "pro");

        document.getElementById("infoMemberSince").textContent = formatMemberSince(memberSince);
        document.getElementById("infoBetaAccess").textContent = betaAccess ? "Enabled" : "Not enabled";
        document.getElementById("infoDownloadCount").textContent = String(downloadCount);
      }

      // Initial paint from cached localStorage values…
      render(null);

      // Resend verification email. Disables itself in flight to block
      // double-sends; POSTs to /resend-verification (added server-side later).
      const resendBtn = document.getElementById("resendVerifyBtn");
      const verifyMessageEl = document.getElementById("verifyMessage");
      if (resendBtn) {
        resendBtn.addEventListener("click", async () => {
          resendBtn.disabled = true;
          if (verifyMessageEl) {
            verifyMessageEl.textContent = "Sending…";
            verifyMessageEl.classList.remove("success", "error");
          }

          try {
            const response = await fetch(`${API_URL}/resend-verification`, {
              method: "POST",
              headers: { ...authHeaders() },
            });
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
              const msg = (data && (data.message || data.error)) || "Could not send verification email.";
              if (verifyMessageEl) {
                verifyMessageEl.textContent = msg;
                verifyMessageEl.classList.add("error");
              }
              resendBtn.disabled = false;
              return;
            }

            if (verifyMessageEl) {
              verifyMessageEl.textContent = "Verification email sent";
              verifyMessageEl.classList.add("success");
            }
            // Stay disabled after success to discourage repeat sends.
          } catch (err) {
            if (verifyMessageEl) {
              verifyMessageEl.textContent = "Unable to reach server. Please try again.";
              verifyMessageEl.classList.add("error");
            }
            resendBtn.disabled = false;
          }
        });
      }

      // …then refresh from GET /me and re-render with the authoritative profile.
      if (typeof loadProfile === "function") {
        loadProfile().then((profile) => {
          if (profile) render(profile);
        });
      }

      checkAuth();

      // User is confirmed logged in (token check above). Prompt for TOS
      // acceptance if their stored version is stale; fails open on error.
      if (typeof checkLegalAcceptance === "function") {
        checkLegalAcceptance();
      }
    })();
  </script>
</body>
</html>
