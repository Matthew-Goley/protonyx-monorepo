<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
  <title>Account | Protonyx</title>
  <style>
    /* Gradient treatment for the plan field when the user is on Pro.
       Applied by the script below based on the plan value from GET /me. */
    .plan-pro {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo">
      <a href="/">
        <img
          id="navbarLogo"
          src="../assets/company/protonyx_full_white.png"
          alt="Protonyx logo"
        >
      </a>
    </div>

    <div class="navbar-actions">
      <a href="/auth/index.html" class="navbar-signup-link guest-only">Create Account</a>
      <a href="/account/index.html" class="navbar-profile-icon auth-only" aria-label="Account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 21c0-4 4-7 8-7s8 3 8 7"></path>
        </svg>
      </a>
      <button class="navbar-menu-button" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <section class="products-hero">
    <div class="products-hero-inner">
      <p class="products-label" id="accountHeroTitle">Account</p>
      <p id="accountHeroSubtitle" style="font-size: 13px; color: var(--text-muted); margin: 0;">Account</p>
    </div>
  </section>

  <section class="account-section">
    <div class="account-section-inner">
      <p class="section-label">Profile</p>

      <dl class="account-info-list">
        <!-- Source: GET /me -> user.username -->
        <dt>Username</dt>
        <dd id="infoUsername">—</dd>

        <!-- Source: GET /me -> user.email -->
        <dt>Email</dt>
        <dd id="infoEmail">—</dd>

        <!-- Source: GET /me -> user.plan (styled with --grad when 'pro') -->
        <dt>Plan</dt>
        <dd id="infoPlan">—</dd>

        <!-- Source: GET /me -> user.member_since (formatted) -->
        <dt>Member since</dt>
        <dd id="infoMemberSince">—</dd>

        <!-- Source: GET /me -> user.beta_access -->
        <dt>Beta access</dt>
        <dd id="infoBetaAccess">—</dd>

        <!-- Source: GET /me -> user.download_count -->
        <dt>Downloads</dt>
        <dd id="infoDownloadCount">—</dd>
      </dl>
    </div>
  </section>

  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-overlay-inner">
      <div class="menu-overlay-header">
        <div class="menu-overlay-brand">
          <img src="../assets/company/protonyx_full_white.png" alt="Protonyx logo">
        </div>
        <button class="menu-close-button" id="menuCloseButton" aria-label="Close menu">×</button>
      </div>
      <div class="menu-overlay-content">
        <div class="menu-column">
          <p class="menu-label">Navigation</p>
          <a href="/" class="menu-link-reveal">Home</a>
          <a href="/products" class="menu-link-reveal">Products</a>
          <a href="/products/vector" class="menu-link-reveal"> ⤷ Vector</a>
          <a href="/careers" class="menu-link-reveal">Careers</a>
          <a href="/about" class="menu-link-reveal">About</a>
          <a href="/contact" class="menu-link-reveal">Contact</a>
          <button type="button" class="menu-logout-button auth-only" data-logout>Logout</button>
        </div>

        <div class="menu-column">
          <p class="menu-label">Account</p>
          <a href="/auth/index.html" class="menu-link-reveal guest-only">Create Account</a>
          <a href="/auth/index.html" class="menu-link-reveal guest-only">Login</a>
          <a href="/account/index.html" class="menu-link-reveal auth-only">Profile</a>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-top">
      <p>&copy; 2026 Protonyx LLC. All rights reserved.</p>
      <nav class="footer-links">
        <a href="/tos">Terms of Service</a>
        <a href="/privacy">Privacy Policy</a>
        <a href="/contact">Contact</a>
      </nav>
    </div>
  </footer>

  <script src="../script.js"></script>
  <script src="../auth/auth.js"></script>
  <script>
    (function () {
      if (!localStorage.getItem("token")) {
        window.location.href = "/auth/index.html";
        return;
      }

      const heroTitleEl = document.getElementById("accountHeroTitle");
      if (heroTitleEl) {
        heroTitleEl.textContent = localStorage.getItem("username") || "Account";
      }

      function formatMemberSince(value) {
        if (!value) return "—";
        const d = new Date(value);
        if (isNaN(d.getTime())) return "—";
        return d.toLocaleDateString(undefined, {
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      }

      function render(profile) {
        // Source: GET /me (with localStorage as fallback for initial paint)
        const username = (profile && profile.username) || localStorage.getItem("username") || "User";
        const email = (profile && profile.email) || localStorage.getItem("email") || "—";
        const plan = (profile && profile.plan) || localStorage.getItem("plan") || "free";
        const memberSince = (profile && profile.member_since) || localStorage.getItem("member_since") || "";
        const betaAccess = profile
          ? Boolean(profile.beta_access)
          : localStorage.getItem("beta_access") === "true";
        const downloadCount = profile
          ? Number(profile.download_count ?? 0)
          : Number(localStorage.getItem("download_count") || 0);

        document.getElementById("infoUsername").textContent = username;
        document.getElementById("infoEmail").textContent = email;

        const planEl = document.getElementById("infoPlan");
        planEl.textContent = plan.charAt(0).toUpperCase() + plan.slice(1);
        planEl.classList.toggle("plan-pro", plan.toLowerCase() === "pro");

        document.getElementById("infoMemberSince").textContent = formatMemberSince(memberSince);
        document.getElementById("infoBetaAccess").textContent = betaAccess ? "Enabled" : "Not enabled";
        document.getElementById("infoDownloadCount").textContent = String(downloadCount);
      }

      // Initial paint from cached localStorage values…
      render(null);

      // …then refresh from GET /me and re-render with the authoritative profile.
      if (typeof loadProfile === "function") {
        loadProfile().then((profile) => {
          if (profile) render(profile);
        });
      }

      checkAuth();
    })();
  </script>
</body>
</html>
