<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <title>Reset password | Protonyx</title>
  <style>
    .reset-card {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
    }

    .reset-logo {
      height: 40px;
      width: auto;
      display: block;
      margin: 0 auto 0.25rem;
    }

    .reset-title {
      margin: 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.4rem;
      font-weight: 600;
      color: #e7ebf3;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .reset-subtitle {
      margin: 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.55);
      text-align: center;
    }

    .reset-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .reset-back-link {
      text-align: center;
      font-size: 0.8rem;
      font-family: 'IBM Plex Mono', monospace;
      color: rgba(255, 255, 255, 0.55);
    }

    .reset-back-link a {
      color: rgba(255, 255, 255, 0.75);
      text-decoration: none;
    }

    .reset-back-link a:hover {
      color: white;
    }
  </style>
</head>
<body class="auth-body">

  <main class="reset-card" role="main">
    <a href="../index.html" aria-label="Protonyx home">
      <img src="../assets/company/protonyx_full_white.png" alt="Protonyx logo" class="reset-logo">
    </a>

    <div id="resetState"></div>
  </main>

  <script src="../auth/auth.js"></script>
  <script>
    const stateEl = document.getElementById("resetState");
    const token = new URLSearchParams(window.location.search).get("token");

    function renderInvalidLink() {
      stateEl.innerHTML = `
        <h1 class="reset-title">Invalid reset link.</h1>
        <p class="reset-subtitle">This link is missing its reset token. Request a new one to continue.</p>
        <p class="reset-back-link" style="margin-top:0.5rem;">
          <a href="../forgot-password/index.html">Request a new reset link</a>
        </p>
      `;
    }

    function renderForm() {
      stateEl.innerHTML = `
        <h1 class="reset-title">Set a new password</h1>
        <p class="reset-subtitle">Choose a new password for your Protonyx account.</p>

        <form class="reset-form" id="resetForm" autocomplete="on" novalidate>
          <div class="auth-field">
            <label for="newPassword">New password</label>
            <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required>
          </div>
          <div class="auth-field">
            <label for="confirmPassword">Confirm password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
          </div>
          <p class="auth-message" id="resetMessage" aria-live="polite"></p>
          <button type="submit" class="auth-submit" id="resetSubmit">Reset password</button>
        </form>

        <p class="reset-back-link">
          <a href="../auth/index.html">← Back to login</a>
        </p>
      `;

      const form = document.getElementById("resetForm");
      const newPwInput = document.getElementById("newPassword");
      const confirmInput = document.getElementById("confirmPassword");
      const messageEl = document.getElementById("resetMessage");
      const submitBtn = document.getElementById("resetSubmit");

      function setMessage(text, kind) {
        messageEl.textContent = text || "";
        messageEl.classList.remove("error", "success");
        if (kind) messageEl.classList.add(kind);
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const newPassword = newPwInput.value;
        const confirmPassword = confirmInput.value;

        if (!newPassword || !confirmPassword) {
          setMessage("Please fill in both password fields.", "error");
          return;
        }

        if (newPassword !== confirmPassword) {
          setMessage("Passwords do not match.", "error");
          return;
        }

        submitBtn.disabled = true;
        setMessage("Resetting password…", null);

        try {
          const response = await fetch(`${API_URL}/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, newPassword }),
          });

          const data = await response.json().catch(() => ({}));

          if (!response.ok || !data.success) {
            const msg = (data && (data.message || data.error)) || "Unable to reset password.";
            setMessage(msg, "error");
            submitBtn.disabled = false;
            return;
          }

          renderSuccess();
        } catch (err) {
          setMessage("Unable to reach server. Please try again.", "error");
          submitBtn.disabled = false;
        }
      });
    }

    function renderSuccess() {
      stateEl.innerHTML = `
        <h1 class="reset-title">Password reset successfully.</h1>
        <p class="reset-subtitle">You can now sign in with your new password.</p>
        <p class="reset-back-link" style="margin-top:0.5rem;">
          <a href="../auth/index.html">Go to sign in</a>
        </p>
      `;
    }

    if (!token) {
      renderInvalidLink();
    } else {
      renderForm();
    }
  </script>
</body>
</html>
