<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/lens-arc-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Lens Arc</title>
    <!-- Apply the saved theme before paint so light mode doesn't flash dark. -->
    <script>
      try {
        if (localStorage.getItem('lens-theme') === 'light')
          document.documentElement.classList.add('light')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
